<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SED Editor</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="app">
    <!-- Welcome screen (shown when no file is open) -->
    <div id="welcome">
        <div class="welcome-inner">
            <h1>SED</h1>
            <p>Structured Engineering Document</p>
            <div class="welcome-actions">
                <button class="btn primary" id="btn-open">Open .sed file</button>
                <button class="btn" id="btn-example">Load SKIMS Americana Example</button>
            </div>
        </div>
    </div>

    <!-- Editor (shown when file is open) -->
    <div id="editor" style="display:none">
        <div id="sidebar">
            <div id="sidebar-header">
                <div class="brand">SED</div>
                <h2 id="project-name"></h2>
                <div class="meta" id="project-meta"></div>
            </div>
            <div id="tabs">
                <div class="tab active" data-tab="spaces">Spaces</div>
                <div class="tab" data-tab="devices">Devices</div>
                <div class="tab" data-tab="submittals">Submittals</div>
                <div class="tab" data-tab="notes">Notes</div>
            </div>
            <div id="tab-spaces" class="tab-content active"></div>
            <div id="tab-devices" class="tab-content"></div>
            <div id="tab-submittals" class="tab-content"></div>
            <div id="tab-notes" class="tab-content"></div>
        </div>

        <div id="main">
            <div id="toolbar">
                <label>Level:</label>
                <select id="level-select"></select>
                <div class="sep"></div>
                <button class="tool-btn" id="btn-sql">SQL</button>
                <button class="tool-btn" id="btn-fit">Fit</button>
            </div>
            <div id="canvas-wrap">
                <canvas id="plan"></canvas>
                <div id="props"></div>
            </div>
            <div id="query-panel">
                <textarea id="query-input" rows="2" placeholder="SELECT * FROM spaces LIMIT 10 (Enter to run)"></textarea>
                <pre id="query-result"></pre>
            </div>
            <div id="status">
                <span id="st-file"></span>
                <span id="st-counts"></span>
                <span id="st-zoom">100%</span>
            </div>
        </div>
    </div>
</div>
<script src="app.js"></script>
</body>
</html>
